name: 2 - Clean Up Workspace and Cluster

# Manual trigger to prevent accidental deletion
on:
  workflow_dispatch:

# REQUIRED FOR OIDC
permissions:
  id-token: write 
  contents: read  

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::876014314701:role/GitHub-K8s-Role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Destroy Infrastructure
        working-directory: ./terraform
        run: |
          terraform init
          
          # This looks at the S3 state file and deletes exactly what was created
          terraform destroy -auto-approve